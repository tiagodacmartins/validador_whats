name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build distributable
        run: npm run dist

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Validador-WhatsApp-win-x64.zip
          generate_release_notes: true
